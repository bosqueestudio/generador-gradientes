<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradX Anim v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --color1: #ff007f;
            --color2: #7f00ff;
            --color3: #00f0ff;
            --color4: #ffaa00;
            --angle: 0deg;
            --posX: 50%;
            --posY: 50%;
            --stop2: 33%;
            --stop3: 66%;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #0f172a; color: #f8fafc; }
        .controls-panel { width: 350px; min-width: 310px; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(10px); padding: 20px; box-shadow: 5px 0 25px rgba(0,0,0,0.3); z-index: 10; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        h2 { font-size: 1.4rem; text-align: center; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; }
        .color-pickers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .color-box { display: flex; flex-direction: column; gap: 5px; }
        .color-box label { font-size: 0.8rem; }
        .color-row { display: flex; gap: 5px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #475569; border-radius: 8px; }
        input[type="text"], #angleInput { width: 100%; background: #334155; border: 1px solid #475569; color: #fff; padding: 5px 10px; border-radius: 8px; font-family: monospace; text-transform: uppercase; text-align: center; }
        .input-container { display: flex; align-items: center; position: relative; }
        .unit-label { position: absolute; right: 10px; font-size: 0.8rem; color: #64748b; }
        .radio-group { display: flex; gap: 10px; }
        .spec-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
        .radio-label { display: flex; align-items: center; gap: 5px; cursor: pointer; background: #334155; padding: 8px 10px; border-radius: 8px; flex: 1; justify-content: center; transition: background 0.3s; font-size: 0.9rem; }
        .radio-label:hover { background: #475569; }
        .radio-label input { display: none; }
        .radio-label input:checked + span { color: #00f0ff; font-weight: bold; }
        .radio-label.active { border: 1px solid #00f0ff; background: #1e293b; }
        input[type="range"] { accent-color: #00f0ff; cursor: pointer; }
        .btn-animate, .btn-download { color: white; border: none; padding: 10px; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: transform 0.2s, opacity 0.2s; width: 100%; margin-bottom: 8px; }
        .btn-animate { background: linear-gradient(135deg, #00f0ff, #7f00ff); }
        .btn-animate.active { background: linear-gradient(135deg, #ff007f, #ffaa00); }
        .btn-download { background: linear-gradient(135deg, #22c55e, #15803d); }
        .btn-animate:hover, .btn-download:hover { transform: translateY(-2px); opacity: 0.9; }
        .visualizer-container { flex: 1; display: flex; align-items: center; justify-content: center; background-color: #020617; padding: 20px; }
        .visualizer { position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border-radius: 12px; max-width: 100%; max-height: 90vh; transition: width 0.4s ease, height 0.4s ease; }
        .ratio-16-9 { width: 100%; max-width: 800px; aspect-ratio: 16 / 9; }
        .ratio-3-4 { height: 100%; max-height: 550px; aspect-ratio: 3 / 4; }
        .ratio-9-16 { height: 100%; max-height: 600px; aspect-ratio: 9 / 16; }
        .linear-gradient { background: linear-gradient(var(--angle), var(--color1) 0%, var(--color2) var(--stop2), var(--color3) var(--stop3), var(--color4) 100%); }
        .radial-gradient { background: radial-gradient(circle at var(--posX) var(--posY), var(--color1) 0%, var(--color2) var(--stop2), var(--color3) var(--stop3), var(--color4) 100%); }
        .code-output { position: absolute; bottom: 15px; right: 15px; background: rgba(15, 23, 42, 0.85); padding: 12px; border-radius: 8px; max-width: 90%; font-family: monospace; font-size: 0.75rem; border: 1px solid #334155; pointer-events: none; word-break: break-all; }
    </style>
</head>
<body>
    <div class="controls-panel">
        <h2>GradX Anim v2</h2>
        <div>
            <div class="section-title">Colores (Hex)</div>
            <div class="color-pickers">
                <div class="color-box"><label>Color 1</label><div class="color-row"><input type="color" id="picker1" value="#ff007f"><input type="text" id="hex1" value="#ff007f" maxlength="7"></div></div>
                <div class="color-box"><label>Color 2</label><div class="color-row"><input type="color" id="picker2" value="#7f00ff"><input type="text" id="hex2" value="#7f00ff" maxlength="7"></div></div>
                <div class="color-box"><label>Color 3</label><div class="color-row"><input type="color" id="picker3" value="#00f0ff"><input type="text" id="hex3" value="#00f0ff" maxlength="7"></div></div>
                <div class="color-box"><label>Color 4</label><div class="color-row"><input type="color" id="picker4" value="#ffaa00"><input type="text" id="hex4" value="#ffaa00" maxlength="7"></div></div>
            </div>
        </div>
        <div>
            <div class="section-title">Tipo de Gradiente</div>
            <div class="radio-group">
                <label class="radio-label active" id="lbl-linear"><input type="radio" name="gtype" value="linear" checked><span>Lineal</span></label>
                <label class="radio-label" id="lbl-radial"><input type="radio" name="gtype" value="radial"><span>Radial</span></label>
            </div>
        </div>
        <div id="angle-control-group">
            <div class="section-title">Ángulo del Gradiente</div>
            <div class="input-container"><input type="text" id="angleInput" value="0"><span class="unit-label">°deg</span></div>
        </div>
        <div>
            <div class="section-title">Fusión de Colores: <span id="blendValue">0%</span></div>
            <input type="range" id="blendSlider" min="0" max="50" step="10" value="0" style="width: 100%;">
        </div>
        <div>
            <div class="section-title">Aspect Ratio</div>
            <div class="radio-group spec-grid">
                <label class="radio-label active" id="lbl-16-9"><input type="radio" name="aspectRatio" value="16-9" checked><span>16:9</span></label>
                <label class="radio-label" id="lbl-3-4"><input type="radio" name="aspectRatio" value="3-4"><span>3:4</span></label>
                <label class="radio-label" id="lbl-9-16"><input type="radio" name="aspectRatio" value="9-16"><span>9:16</span></label>
            </div>
        </div>
        <div>
            <div class="section-title">Acciones</div>
            <button class="btn-animate" id="btnAnimate">Iniciar Animación</button>
            <button class="btn-download" id="btnDownload">Descargar PNG</button>
        </div>
    </div>
    <div class="visualizer-container">
        <div class="visualizer linear-gradient ratio-16-9" id="visualizer">
            <div class="code-output" id="codeOutput">background: linear-gradient(0deg, #ff007f, #7f00ff, #00f0ff, #ffaa00);</div>
        </div>
    </div>
    <script>
        const visualizer = document.getElementById('visualizer');
        const codeOutput = document.getElementById('codeOutput');
        const btnAnimate = document.getElementById('btnAnimate');
        const btnDownload = document.getElementById('btnDownload');
        const angleInput = document.getElementById('angleInput');
        const angleControlGroup = document.getElementById('angle-control-group');
        const blendSlider = document.getElementById('blendSlider');
        const blendValue = document.getElementById('blendValue');
        const pickers = [1, 2, 3, 4].map(i => document.getElementById(`picker${i}`));
        const hexInputs = [1, 2, 3, 4].map(i => document.getElementById(`hex${i}`));
        const radiosGtype = document.getElementsByName('gtype');
        const radiosRatio = document.getElementsByName('aspectRatio');
        let isAnimating = false;
        calculateStops(0);
        pickers.forEach((picker, index) => {
            picker.addEventListener('input', (e) => {
                let color = e.target.value; hexInputs[index].value = color;
                document.documentElement.style.setProperty(`--color${index + 1}`, color); updateOutputText();
            });
        });
        hexInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                let color = e.target.value;
                if(/^#[0-9A-F]{6}$/i.test(color)) {
                    pickers[index].value = color; document.documentElement.style.setProperty(`--color${index + 1}`, color); updateOutputText();
                }
            });
        });
        radiosGtype.forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.getElementById('lbl-linear').classList.toggle('active', e.target.value === 'linear');
                document.getElementById('lbl-radial').classList.toggle('active', e.target.value === 'radial');
                if (e.target.value === 'linear') {
                    visualizer.classList.remove('radial-gradient'); visualizer.classList.add('linear-gradient'); angleControlGroup.style.display = 'block';
                } else {
                    visualizer.classList.remove('linear-gradient'); visualizer.classList.add('radial-gradient'); angleControlGroup.style.display = 'none';
                }
                updateOutputText();
            });
        });
        angleInput.addEventListener('input', (e) => {
            if(!isAnimating) {
                let value = parseInt(e.target.value) || 0; document.documentElement.style.setProperty('--angle', `${value}deg`); updateOutputText();
            }
        });
        blendSlider.addEventListener('input', (e) => {
            let val = parseInt(e.target.value); blendValue.textContent = `${val}%`; calculateStops(val); updateOutputText();
        });
        function calculateStops(blendFactor) {
            let stop2 = 33 + (blendFactor * 0.33); let stop3 = 66 - (blendFactor * 0.33);
            document.documentElement.style.setProperty('--stop2', `${stop2}%`); document.documentElement.style.setProperty('--stop3', `${stop3}%`);
        }
        radiosRatio.forEach(radio => {
            radio.addEventListener('change', (e) => {
                visualizer.classList.remove('ratio-16-9', 'ratio-3-4', 'ratio-9-16');
                document.getElementById('lbl-16-9').classList.remove('active'); document.getElementById('lbl-3-4').classList.remove('active'); document.getElementById('lbl-9-16').classList.remove('active');
                document.getElementById(`lbl-${e.target.value}`).classList.add('active'); visualizer.classList.add(`ratio-${e.target.value}`);
            });
        });
        function updateOutputText() {
            const type = document.querySelector('input[name="gtype"]:checked').value;
            const c1 = hexInputs[0].value; const c2 = hexInputs[1].value; const c3 = hexInputs[2].value; const c4 = hexInputs[3].value;
            const s2 = getComputedStyle(document.documentElement).getPropertyValue('--stop2').trim(); const s3 = getComputedStyle(document.documentElement).getPropertyValue('--stop3').trim();
            if (type === 'linear') {
                const angle = getComputedStyle(document.documentElement).getPropertyValue('--angle').trim();
                codeOutput.textContent = `background: linear-gradient(${angle}, ${c1} 0%, ${c2} ${s2}, ${c3} ${s3}, ${c4} 100%);`;
            } else {
                const posX = getComputedStyle(document.documentElement).getPropertyValue('--posX').trim(); const posY = getComputedStyle(document.documentElement).getPropertyValue('--posY').trim();
                codeOutput.textContent = `background: radial-gradient(circle at ${posX} ${posY}, ${c1} 0%, ${c2} ${s2}, ${c3} ${s3}, ${c4} 100%);`;
            }
        }
        let currentAngle = 0; let currentX = 50; let currentY = 50; let targetAngle = 0; let targetX = 50; let targetY = 50;
        function animate() {
            if (!isAnimating) return;
            currentAngle += (targetAngle - currentAngle) * 0.05; currentX += (targetX - currentX) * 0.05; currentY += (targetY - currentY) * 0.05;
            const type = document.querySelector('input[name="gtype"]:checked').value;
            if (type === 'linear') {
                document.documentElement.style.setProperty('--angle', `${Math.round(currentAngle)}deg`); angleInput.value = Math.round(currentAngle);
            } else {
                document.documentElement.style.setProperty('--posX', `${Math.round(currentX)}%`); document.documentElement.style.setProperty('--posY', `${Math.round(currentY)}%`);
            }
            updateOutputText();
            if (Math.abs(targetAngle - currentAngle) < 1 && Math.abs(targetX - currentX) < 1) { pickNewTargets(); }
            requestAnimationFrame(animate);
        }
        function pickNewTargets() { targetAngle = Math.random() * 360; targetX = Math.random() * 100; targetY = Math.random() * 100; }
        btnAnimate.addEventListener('click', () => {
            isAnimating = !isAnimating;
            if (isAnimating) {
                btnAnimate.textContent = "Detener Animación"; btnAnimate.classList.add('active'); pickNewTargets(); animate();
            } else {
                btnAnimate.textContent = "Iniciar Animación"; btnAnimate.classList.remove('active');
            }
        });
        btnDownload.addEventListener('click', () => {
            codeOutput.style.display = 'none';
            html2canvas(visualizer, { useCORS: true, logging: false, width: visualizer.offsetWidth, height: visualizer.offsetHeight }).then(canvas => {
                const link = document.createElement('a'); link.download = `gradiente-${document.querySelector('input[name="aspectRatio"]:checked').value}.png`;
                link.href = canvas.toDataURL('image/png'); link.click(); codeOutput.style.display = 'block';
            });
        });
    </script>
</body>
</html>
