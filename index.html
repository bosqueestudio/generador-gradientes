 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Blob Generator OS</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --panel-bg: #1a1a1a;
            --text-light: #ffffff;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            overflow: hidden;
            color: var(--text-light);
        }

        /* UI SIDEBAR PANEL */
        .toolbar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: #fff;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .color-pickers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        label {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #888;
        }

        .label-val {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-val span {
            font-size: 0.75rem;
            color: #fff;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
        }

        select, input[type="color"], button, input[type="range"] {
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            background: #222;
            color: #fff;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            background: #2a2a2a;
            border-color: #555;
        }

        input[type="color"] {
            height: 40px;
            padding: 2px;
            border-radius: 4px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: #222;
            padding: 5px 0;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            background: #fff;
            border: 1px solid #000;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .radio-btn {
            display: none;
        }

        .radio-label {
            display: block;
            text-align: center;
            background: #222;
            padding: 10px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .radio-btn:checked + .radio-label {
            background: #fff;
            color: #000;
            font-weight: bold;
            border-color: #fff;
        }

        .btn-clear { color: #ff5555; border-color: #552222; }
        .btn-clear:hover { background: #331111; }
        
        .btn-action { background: #ffffff; color: #000000; font-weight: bold; text-transform: uppercase; margin-top: auto; }
        .btn-action:hover { background: #dddddd; }

        .btn-anim { background: #007bff; color: white; font-weight: bold; text-transform: uppercase;}
        .btn-anim:hover { background: #0056b3; }

        /* CANVAS AREA WITH FIXED ASPECT RATIOS */
        .canvas-container {
            flex-grow: 1;
            height: 100%;
            background: #050505; /* Fondo exterior más oscuro para notar los límites del canvas */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #222;
            transition: width 0.3s ease, height 0.3s ease;
        }

        canvas {
            display: block;
            background: var(--bg-dark);
            cursor: crosshair;
        }

        .status-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #555;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Blob Generator OS</h2>
        
        <div class="tool-group">
            <label>Canvas Aspect Ratio</label>
            <div class="radio-group">
                <input type="radio" name="aspect-ratio" id="ratio-horizontal" value="16:9" checked class="radio-btn" onchange="updateCanvasFormat()">
                <label for="ratio-horizontal" class="radio-label">Horizontal (16:9)</label>
                
                <input type="radio" name="aspect-ratio" id="ratio-vertical" value="3:5" class="radio-btn" onchange="updateCanvasFormat()">
                <label for="ratio-vertical" class="radio-label">Vertical (3:5)</label>
            </div>
        </div>

        <div class="tool-group">
            <label>Pixel Shape</label>
            <select id="pixel-shape">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="diamond">Diamond</option>
            </select>
        </div>

        <div class="tool-group">
            <label>Color Combination</label>
            <div class="color-pickers">
                <div>
                    <label style="font-size:10px;">Center</label>
                    <input type="color" id="color-center" value="#f4f3b6">
                </div>
                <div>
                    <label style="font-size:10px;">Echo 1</label>
                    <input type="color" id="color-echo1" value="#e3a7fd">
                </div>
                <div>
                    <label style="font-size:10px;">Echo 2</label>
                    <input type="color" id="color-echo2" value="#9ef8db">
                </div>
            </div>
        </div>

        <div class="tool-group">
            <label>Color Fusion (Blur)</label>
            <div class="radio-group">
                <input type="radio" name="color-fusion" id="fusion-off" value="off" checked class="radio-btn">
                <label for="fusion-off" class="radio-label">Sharp</label>
                
                <input type="radio" name="color-fusion" id="fusion-on" value="on" class="radio-btn">
                <label for="fusion-on" class="radio-label">Fused</label>
            </div>
        </div>

        <div class="tool-group">
            <label>Brush Stroke</label>
            <div class="radio-group">
                <input type="radio" name="stroke-option" id="stroke-on" value="on" checked class="radio-btn">
                <label for="stroke-on" class="radio-label">With Stroke</label>
                
                <input type="radio" name="stroke-option" id="stroke-off" value="off" class="radio-btn">
                <label for="stroke-off" class="radio-label">No Stroke</label>
            </div>
        </div>

        <div class="tool-group">
            <div class="label-val">
                <label>Brush Scale</label>
                <span id="scale-val">60%</span>
            </div>
            <input type="range" id="pixel-scale-slider" min="10" max="100" step="10" value="60" oninput="updateScaleLabel(this.value)">
        </div>

        <div class="tool-group">
            <div class="label-val">
                <label>Imperfect Behavior</label>
                <span id="clumsy-val">Organic</span>
            </div>
            <input type="range" id="brush-clumsy-slider" min="1" max="3" step="1" value="2" oninput="updateClumsyLabel(this.value)">
        </div>

        <hr style="border:0; border-top: 1px solid var(--border-color); width:100%; margin: 5px 0;">

        <button class="btn-clear" onclick="clearCanvas()">Clear Canvas</button>
        <button class="btn-anim" onclick="playDrawingAnimation()">▶ Re-Animate Trazo</button>
        
        <button class="btn-action" onclick="saveAsset()">Save Asset (.PNG)</button>
    </div>

    <div class="canvas-container" id="canvas-holder">
        <div class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="paintCanvas"></canvas>
        </div>
        <div class="status-info" id="status-text">Dark Canvas Active</div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-holder');
        const wrapper = document.getElementById('canvas-wrapper');

        let strokeHistory = []; 
        let isDrawing = false;

        let clumsyX = 0;
        let clumsyY = 0;

        // MANEJO DINÁMICO DE RESOLUCIÓN EN TIEMPO REAL
        function updateCanvasFormat() {
            const activeRatio = document.querySelector('input[name="aspect-ratio"]:checked').value;
            
            // Medidas máximas del contenedor restando márgenes de la UI
            const maxW = container.clientWidth - 80;
            const maxH = container.clientHeight - 80;

            let targetW, targetH;

            if (activeRatio === "16:9") {
                // Forzar proporciones HD horizontales nativas en viewport
                targetW = maxW;
                targetH = maxW * (9 / 16);
                if (targetH > maxH) {
                    targetH = maxH;
                    targetW = maxH * (16 / 9);
                }
            } else {
                // Forzar proporciones verticales 3:5 nativas en viewport
                targetH = maxH;
                targetW = maxH * (3 / 5);
                if (targetW > maxW) {
                    targetW = maxW;
                    targetH = maxW * (5 / 3);
                }
            }

            // Ajustar tamaño del wrapper visual CSS
            wrapper.style.width = `${targetW}px`;
            wrapper.style.height = `${targetH}px`;

            // Configurar el Canvas interno con la resolución nativa de exportación limpia
            canvas.width = (activeRatio === "16:9") ? 1920 : 1080;
            canvas.height = (activeRatio === "16:9") ? 1080 : 1350;

            resetCanvasBackground(ctx, canvas.width, canvas.height);
            redrawFromHistory();
        }

        window.addEventListener('resize', updateCanvasFormat);
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(updateCanvasFormat, 150);
        });

        function resetCanvasBackground(context, width, height) {
            context.fillStyle = "#0d0d0d"; 
            context.fillRect(0, 0, width, height);
        }

        function updateScaleLabel(val) {
            document.getElementById('scale-val').innerText = val + '%';
        }

        function updateClumsyLabel(val) {
            const labels = ["Settle", "Organic", "Wild"];
            document.getElementById('clumsy-val').innerText = labels[val - 1];
        }

        function drawEchos(context, x, y, shape, size, cCenter, cEcho1, cEcho2, useStroke, useBlur) {
            context.save();
            
            if(useBlur) {
                context.filter = `blur(${size * 0.12}px)`;
            }

            context.strokeStyle = '#000000';
            context.lineWidth = 1.5; // Ajustado proporcionalmente para alta resolución (1920/1080)

            // Echo 2
            context.fillStyle = cEcho2;
            renderSingleGeom(context, x, y, shape, size * 1.3);
            if (useStroke) context.stroke();

            // Echo 1
            context.fillStyle = cEcho1;
            renderSingleGeom(context, x, y, shape, size * 1.15);
            if (useStroke) context.stroke();

            // Centro
            context.fillStyle = cCenter;
            renderSingleGeom(context, x, y, shape, size);
            if (useStroke) context.stroke();

            context.restore();
        }

        function renderSingleGeom(context, x, y, shape, size) {
            context.beginPath();
            if (shape === 'circle') {
                context.arc(x, y, size / 2, 0, Math.PI * 2);
            } else if (shape === 'square') {
                context.rect(x - size / 2, y - size / 2, size, size);
            } else if (shape === 'diamond') {
                context.moveTo(x, y - size / 2);
                context.lineTo(x + size / 2, y);
                context.lineTo(x, y + size / 2);
                context.lineTo(x - size / 2, y);
                context.closePath();
            }
            context.fill();
        }

        function addStrokePoint(rawX, rawY, isNewNode = false) {
            const clumsySliderVal = parseInt(document.getElementById('brush-clumsy-slider').value);
            const clumsyFactors = [0.15, 0.45, 0.85];
            const clumsyFactor = clumsyFactors[clumsySliderVal - 1];

            const percentScale = parseInt(document.getElementById('pixel-scale-slider').value);
            // El tamaño se calcula directamente relativo a la alta resolución nativa
            const calculatedSize = (percentScale / 100) * 180; 

            const strokeSetting = document.querySelector('input[name="stroke-option"]:checked').value === 'on';
            const fusionSetting = document.querySelector('input[name="color-fusion"]:checked').value === 'on';

            if (isNewNode) {
                clumsyX = rawX;
                clumsyY = rawY;
            } else {
                clumsyX += (rawX - clumsyX) * 0.25;
                clumsyY += (rawY - clumsyY) * 0.25;

                const jitter = (calculatedSize * clumsyFactor) * 0.05;
                clumsyX += (Math.random() - 0.5) * jitter;
                clumsyY += (Math.random() - 0.5) * jitter;
            }

            const pointData = {
                x: clumsyX,
                y: clumsyY,
                shape: document.getElementById('pixel-shape').value,
                size: calculatedSize,
                cCenter: document.getElementById('color-center').value,
                cEcho1: document.getElementById('color-echo1').value,
                cEcho2: document.getElementById('color-echo2').value,
                stroke: strokeSetting,
                blur: fusionSetting
            };

            strokeHistory.push(pointData);
            drawEchos(ctx, pointData.x, pointData.y, pointData.shape, pointData.size, pointData.cCenter, pointData.cEcho1, pointData.cEcho2, pointData.stroke, pointData.blur);
        }

        // Traduce coordenadas físicas de pantalla a la rejilla de alta resolución del Canvas
        getCanvasCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            // Regla de tres para mapear la posición real en base a la escala del lienzo estirado por CSS
            return {
                x: ((clientX - rect.left) / rect.width) * canvas.width,
                y: ((clientY - rect.top) / rect.height) * canvas.height
            };
        }

        function handleStart(e) {
            isDrawing = true;
            const coords = getCanvasCoords(e);
            addStrokePoint(coords.x, coords.y, true);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault(); 
            const coords = getCanvasCoords(e);
            addStrokePoint(coords.x, coords.y, false);
        }

        function handleEnd() { isDrawing = false; }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);

        function redrawFromHistory() {
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            for(let pt of strokeHistory) {
                drawEchos(ctx, pt.x, pt.y, pt.shape, pt.size, pt.cCenter, pt.cEcho1, pt.cEcho2, pt.stroke, pt.blur);
            }
        }

        function playDrawingAnimation() {
            if (strokeHistory.length === 0) return;
            
            let index = 0;
            const totalPoints = strokeHistory.length;
            const statusTxt = document.getElementById('status-text');
            
            function animateLoop() {
                if (index === 0) {
                    resetCanvasBackground(ctx, canvas.width, canvas.height);
                }

                let progress = index / totalPoints;
                let stepSpeed = 1;

                if (progress < 0.15 || progress > 0.85) {
                    stepSpeed = Math.max(1, Math.floor(totalPoints * 0.008));
                } else {
                    stepSpeed = Math.max(2, Math.floor(totalPoints * 0.03));
                }

                const nextTarget = Math.min(index + stepSpeed, totalPoints);
                
                for (let i = index; i < nextTarget; i++) {
                    const pt = strokeHistory[i];
                    drawEchos(ctx, pt.x, pt.y, pt.shape, pt.size, pt.cCenter, pt.cEcho1, pt.cEcho2, pt.stroke, pt.blur);
                }

                index = nextTarget;
                statusTxt.innerText = `Animating: ${Math.floor(progress * 100)}%`;

                if (index < totalPoints) {
                    requestAnimationFrame(animateLoop);
                } else {
                    statusTxt.innerText = `Animation Done`;
                }
            }
            
            requestAnimationFrame(animateLoop);
        }

        // GUARDADO DE IMAGEN PNG DIRECTO SEGÚN EL FORMATO CONFIGURADO
        function saveAsset() {
            if (strokeHistory.length === 0) {
                alert("Lienzo vacío.");
                return;
            }

            const activeRatio = document.querySelector('input[name="aspect-ratio"]:checked').value;
            const formatName = activeRatio.replace(':', 'x');

            const link = document.createElement('a');
            link.download = `asset-master-${formatName}-${Date.now()}.png`;
            // Exporta directamente la matriz nativa (1920x1080 o 1080x1350) limpia sin pérdida de pixeles
            link.href = canvas.toToDataURL ? canvas.toDataURL('image/png') : canvas.toDataURL();
            link.click();
        }

        function clearCanvas() {
            strokeHistory = [];
            resetCanvasBackground(ctx, canvas.width, canvas.height);
            document.getElementById('status-text').innerText = "Canvas Cleared";
        }
    </script>
</body>
</html>
