<!DOCTYPE html>
<html lang="en">

    <title>Gradient Generator Vol. 1</title>
    <style>
        :root {

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(13, 14, 18, 0.95); backdrop-filter: blur(20px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--border-gray); border-radius: 24px; padding: 40px; max-width: 440px; width: 90%; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .section-header { font-size: 0.72rem; color: var(--text-main); padding: 10px 12px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); user-select: none; }
        .section-header::after { content: '▼'; font-size: 0.55rem; color: var(--text-muted); transition: transform 0.3s; }

        .color-pickers::-webkit-scrollbar-thumb { background: var(--border-gray); }
        .color-row { display: flex; gap: 6px; align-items: center; }

        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border-gray); border-radius: 50%; }
        
        /* EFECTO ROLLOVER: Subrayado interactivo morado solicitado */
        input[type="text"] {

            color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 0.72rem; text-align: center;
            transition: all 0.2s ease;
        }
        input[type="text"]:hover, input[type="text"]:focus {

            outline: none;
        }

        .radio-label { 
            background: var(--bg-input); border: 1px solid var(--border-gray);

            font-size: 0.68rem; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .radio-label:hover { border-color: var(--aura-purple); color: var(--aura-purple); }

        input[type="range"] { accent-color: var(--aura-purple); cursor: pointer; width: 100%; background: var(--bg-input); height: 3px; border-radius: 2px; }
