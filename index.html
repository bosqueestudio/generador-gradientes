 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Generator Vol. 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --angle: 0deg;
            --posX: 50%;
            --posY: 50%;
            --gradSize: 100%;
            
            /* Paleta basada exactamente en la nueva interfaz Aura AI */
            --bg-darkest: #0d0e12;
            --bg-panel: #161722;
            --bg-input: #212330;
            --border-gray: #2c2e3f;
            --text-main: #f1f1f7;
            --text-muted: #787c99;
            
            /* Color morado sólido solicitado para botones principales y activos */
            --aura-purple: #B370FF;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        body { 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-darkest); 
            color: var(--text-main); 
            overflow: hidden;
        }
        
        /* WELCOME MODAL ESTILO AURA */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 14, 18, 0.9);
            backdrop-filter: blur(16px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        .modal-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-gray);
            border-radius: 24px;
            padding: 36px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .modal-box h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .modal-box p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .modal-box .btn-enter {
            background: var(--aura-purple);
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .modal-box .btn-enter:hover {
            opacity: 0.9;
        }

        /* PANEL IZQUIERDO (Aura Sidebar UI) */
        .controls-panel { 
            width: 330px; 
            min-width: 310px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border-gray); 
            padding: 20px 16px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            z-index: 10;
        }
        
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 16px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-gray);
        }
        .logo-container img {
            width: 200px;
            height: auto;
            max-height: 45px; 
            object-fit: contain;
        }
        
        h2 { 
            font-size: 0.8rem; 
            text-align: center; 
            color: var(--text-muted); 
            font-weight: 500; 
            margin-bottom: 16px; 
        }
        
        /* Contenedor escrolleable interno para evitar desbordes */
        .sections-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 2px;
        }
        .sections-scroll::-webkit-scrollbar { width: 0px; } /* Oculto al estilo móvil */

        /* Estructura Corregida para Desplegables */
        .ui-section { 
            border: 1px solid var(--border-gray); 
            border-radius: 16px; 
            background: rgba(255, 255, 255, 0.01); 
            overflow: hidden; 
            transition: background 0.2s ease;
        }
        
        .section-header { 
            font-size: 0.78rem; 
            color: var(--text-main); 
            padding: 12px 14px;
            font-weight: 600; 
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(255,255,255,0.02);
        }
        .section-header:hover { background: rgba(255,255,255,0.04); }
        
        /* Indicadores de flecha */
        .section-header::after { 
            content: ''; 
            width: 6px; height: 6px; 
            border-right: 2px solid var(--text-muted); 
            border-bottom: 2px solid var(--text-muted); 
            transform: rotate(45deg); 
            transition: transform 0.2s ease;
            margin-right: 4px;
        }
        .ui-section.collapsed .section-header::after { 
            transform: rotate(-45deg); 
        }
        
        /* Contenedor del contenido que se oculta/muestra */
        .section-content { 
            padding: 14px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            border-top: 1px solid var(--border-gray);
            background: rgba(0, 0, 0, 0.1);
        }
        
        /* Clase JS para colapsar de forma limpia */
        .ui-section.collapsed .section-content { 
            display: none !important; 
        }

        .section-title { 
            font-size: 0.72rem; 
            color: var(--text-muted); 
            display: flex; 
            justify-content: space-between; 
            font-weight: 400;
        }
        
        /* Iluminación condicionada al Rollover */
        .ui-section:hover .section-title span { 
            color: var(--aura-purple); 
        }

        .count-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }

        .color-pickers { display: flex; flex-direction: column; gap: 8px; max-height: 160px; overflow-y: auto; }
        .color-box { display: flex; flex-direction: column; gap: 4px; }
        .color-box label { font-size: 0.68rem; color: var(--text-muted); }
        .color-row { display: flex; gap: 6px; align-items: center; }
        
        input[type="color"] { -webkit-appearance: none; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border-gray); border-radius: 50%; }
        
        input[type="text"], #angleInput { 
            width: 100%; 
            background: var(--bg-input); 
            border: 1px solid var(--border-gray); 
            color: #fff; 
            padding: 6px 12px; 
            border-radius: 40px; 
            font-size: 0.72rem; 
            text-align: center; 
            transition: border-color 0.2s; 
        }
        input[type="text"]:hover, #angleInput:hover { border-color: var(--aura-purple); }
        
        .radio-group { display: flex; gap: 6px; width: 100%; }
        .spec-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
        .blur-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        
        .radio-label { 
            display: flex; 
            align-items: center; 
            gap: 2px; 
            cursor: pointer; 
            background: var(--bg-input); 
            border: 1px solid var(--border-gray); 
            padding: 6px 8px; 
            border-radius: 40px; 
            flex: 1; 
            justify-content: center; 
            font-size: 0.7rem; 
            color: var(--text-main); 
            transition: all 0.2s; 
        }
        .radio-label:hover { border-color: var(--aura-purple); color: var(--aura-purple); }
        .radio-label input { display: none; }
        
        /* Botones de opción marcados: Color sólido Morado de la imagen */
        .radio-label.active { 
            border: 1px solid var(--aura-purple); 
            background: var(--aura-purple); 
            color: #000; 
        }
        .radio-label.active span { font-weight: 600; }
        
        input[type="range"] { accent-color: var(--text-muted); cursor: pointer; width: 100%; background: var(--bg-input); height: 3px; }
        input[type="range"]:hover { accent-color: var(--aura-purple); }

        .bottom-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 12
